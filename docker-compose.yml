version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: smb-intelligence-api:latest
    container_name: smb_api
    ports:
      - "8000:8000"
    environment:
      - MOCK_MODE=${MOCK_MODE:-false}
      - API_PORT=8000
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-smb_intelligence}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
